<svg width="1280" height="380" viewBox="0 0 1280 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ettios Blockchain">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070F"/>
      <stop offset="0.5" stop-color="#0A1B3D"/>
      <stop offset="1" stop-color="#071229"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="166" y1="120" x2="640" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#BFE9F7"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.82" cy="0.30" r="0.5">
      <stop stop-color="#22D3EE" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.10" cy="0.85" r="0.5">
      <stop stop-color="#6366F1" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1280" height="380" rx="22" fill="url(#bg)"/>
  <rect width="1280" height="380" rx="22" fill="url(#glowA)"/>
  <rect width="1280" height="380" rx="22" fill="url(#glowB)"/>

  <!-- faint perspective grid -->
  <g stroke="#16335C" stroke-width="1" opacity="0.30">
    <path d="M0 95 H1280 M0 190 H1280 M0 285 H1280"/>
    <path d="M213 0 V380 M426 0 V380 M640 0 V380 M853 0 V380 M1066 0 V380"/>
  </g>

  <!-- network constellation (right) -->
  <g>
    <g stroke="url(#accent)" stroke-width="1.5" opacity="0.55">
      <line x1="958" y1="120" x2="1078" y2="78"/>
      <line x1="1078" y1="78" x2="1188" y2="148"/>
      <line x1="1188" y1="148" x2="1108" y2="252"/>
      <line x1="1108" y1="252" x2="958" y2="120"/>
      <line x1="1078" y1="78" x2="1108" y2="252"/>
      <line x1="958" y1="120" x2="1188" y2="148"/>
      <line x1="1000" y1="312" x2="1108" y2="252"/>
      <line x1="1000" y1="312" x2="958" y2="120"/>
      <line x1="1206" y1="278" x2="1108" y2="252"/>
    </g>
    <g fill="url(#accent)">
      <circle cx="958" cy="120" r="10" filter="url(#soft)"/><circle cx="958" cy="120" r="6"/>
      <circle cx="1078" cy="78" r="10" filter="url(#soft)"/><circle cx="1078" cy="78" r="6"/>
      <circle cx="1188" cy="148" r="11" filter="url(#soft)"/><circle cx="1188" cy="148" r="7"/>
      <circle cx="1108" cy="252" r="10" filter="url(#soft)"/><circle cx="1108" cy="252" r="6"/>
      <circle cx="1000" cy="312" r="7" filter="url(#soft)"/><circle cx="1000" cy="312" r="4.5"/>
      <circle cx="1206" cy="278" r="6" filter="url(#soft)"/><circle cx="1206" cy="278" r="4"/>
    </g>
  </g>

  <!-- hexagon logo mark -->
  <g transform="translate(92 158)">
    <path d="M0 -50 L43 -25 L43 25 L0 50 L-43 25 L-43 -25 Z" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <path d="M0 -27 L23 -13 L23 13 L0 27 L-23 13 L-23 -13 Z" fill="url(#accent)" opacity="0.20"/>
    <text x="0" y="13" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="40" font-weight="800" fill="#FFFFFF" text-anchor="middle">E</text>
  </g>

  <!-- wordmark -->
  <text x="172" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="82" font-weight="800" fill="url(#wordmark)" letter-spacing="1.5">ETTIOS</text>
  <text x="176" y="198" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="29" font-weight="600" fill="#22D3EE" letter-spacing="7.5">B L O C K C H A I N</text>

  <!-- tagline -->
  <text x="176" y="248" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="20" font-weight="400" fill="#9FB3CF">The Layer-1 for alternative investments, NFTs &amp; on-chain finance.</text>

  <!-- live + spec chips -->
  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="600">
    <g transform="translate(176 282)">
      <rect width="138" height="36" rx="18" fill="#0C2A1E" stroke="#34D399" stroke-opacity="0.55"/>
      <circle cx="24" cy="18" r="5" fill="#34D399"/>
      <text x="82" y="23" fill="#A7F3D0" text-anchor="middle">Mainnet Live</text>
    </g>
    <g transform="translate(326 282)">
      <rect width="150" height="36" rx="18" fill="#0E2747" stroke="#22D3EE" stroke-opacity="0.45"/>
      <text x="75" y="23" fill="#CFE8F4" text-anchor="middle">Chain ID 20240</text>
    </g>
    <g transform="translate(488 282)">
      <rect width="118" height="36" rx="18" fill="#0E2747" stroke="#22D3EE" stroke-opacity="0.45"/>
      <text x="59" y="23" fill="#CFE8F4" text-anchor="middle">Token · ETT</text>
    </g>
    <g transform="translate(618 282)">
      <rect width="150" height="36" rx="18" fill="#0E2747" stroke="#6366F1" stroke-opacity="0.55"/>
      <text x="75" y="23" fill="#C7D2FE" text-anchor="middle">EVM-Compatible</text>
    </g>
  </g>
</svg>
